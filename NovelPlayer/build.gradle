buildscript {
    repositories {
        maven { url 'https://mirrors.cloud.tencent.com/maven/' }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}

allprojects {
    repositories {
        maven { url 'https://mirrors.cloud.tencent.com/maven/' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
